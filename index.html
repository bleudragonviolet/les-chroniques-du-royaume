<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Chroniques du Royaume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <audio id="ambiance" loop>
        <source src="assets/ambiance.mp3" type="audio/mp3">
    </audio>

    <!-- CANVAS PARTICULES -->
    <canvas id="particles"></canvas>

    <!-- ÉCRAN D'ENTRÉE -->
    <div id="intro">
        <div class="intro-bg"></div>

        <!-- Portes -->
        <div class="doors-wrapper">
            <div class="door left" id="doorLeft">
                <div class="door-planks"></div>
                <div class="door-details">
                    <div class="door-cross"></div>
                    <div class="door-arch-top"></div>
                    <div class="rivets">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="handle-wrap left-handle">
                    <div class="handle">
                        <div class="handle-ring"></div>
                        <div class="handle-plate"></div>
                    </div>
                </div>
            </div>
            <div class="door right" id="doorRight">
                <div class="door-planks"></div>
                <div class="door-details">
                    <div class="door-cross"></div>
                    <div class="door-arch-top"></div>
                    <div class="rivets">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="handle-wrap right-handle">
                    <div class="handle">
                        <div class="handle-ring"></div>
                        <div class="handle-plate"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Arc et cimier -->
        <div class="gate-arch">
            <div class="arch-ornament">
                <span class="crown-icon">👑</span>
            </div>
        </div>

        <!-- Contenu central -->
        <div class="intro-center">
            <div class="intro-title">
                <h1>Les Chroniques<br><span>du Royaume</span></h1>
                <p class="intro-subtitle">Archives des Œuvres Mémorables</p>
            </div>
            <button id="enterBtn" class="enter-btn">
                <span class="btn-sword">⚔️</span>
                <span class="btn-text">Entrer dans le Royaume</span>
                <span class="btn-glow"></span>
            </button>
        </div>

        <!-- Barre de chargement (cachée jusqu'au clic) -->
        <div class="loading-overlay" id="loadingOverlay">
            <p id="loading-status">Lecture des parchemins...</p>
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
                <div class="progress-glow"></div>
            </div>
        </div>
    </div>

    <!-- SITE PRINCIPAL -->
    <div id="site" class="hidden">

        <header>
            <div class="header-bg"></div>
            <div class="header-content">
                <div class="header-emblem">⚜️</div>
                <h1 class="site-title">Les Chroniques du Royaume</h1>
                <p class="site-subtitle">📜 Archives Royales</p>
                <div class="header-actions">
                    <div class="audio-controls">
                        <span class="audio-icon" id="muteToggle">🔊</span>
                        <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.3">
                    </div>
                    <button class="stats-btn" onclick="openStats()">📊 Statistiques</button>
                    <a href="jeux.html" class="stats-btn" style="text-decoration:none">⚔️ Arène des Jeux</a>
                </div>
            </div>
            <div class="header-divider">
                <div class="divider-line"></div>
                <div class="divider-ornament">✦</div>
                <div class="divider-line"></div>
            </div>
        </header>

        <div class="controls">
            <div class="search-wrapper">
                <span class="search-icon">🔎</span>
                <input type="text" id="search" placeholder="Rechercher dans les Archives...">
                <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" title="Effacer la recherche">✕</button>
                <div class="search-underline"></div>
            </div>
            <div class="filters-row">
                <div class="select-wrapper">
                    <select id="filter">
                        <option value="Tous">⚜️ Toutes catégories</option>
                        <option value="Jeu">🎮 Jeux</option>
                        <option value="Film">🎬 Films</option>
                        <option value="Série">📺 Séries</option>
                        <option value="Livre">📖 Livres</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="sort">
                        <option value="recent">📅 Plus récents</option>
                        <option value="note">⭐ Meilleure note</option>
                        <option value="default">🏰 Par défaut</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="stats" class="stats-bar"></div>

        <div id="catalogue" class="catalogue"></div>

        <footer>
            <div class="footer-divider">
                <div class="divider-line"></div>
                <div class="divider-ornament">⚜️</div>
                <div class="divider-line"></div>
            </div>
            <p>👑 Les Chroniques du Royaume — Archives Mémoriales</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
